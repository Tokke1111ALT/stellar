<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Editor Layout</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --text-main: #cccccc;
            --accent: #007fd4;
            --border: #3e3e42;
            --toolbar-bg: #2d2d30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Toolbar */
        header {
            height: 40px;
            background-color: var(--bg-header);
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }

        .logo {
            font-weight: bold;
            color: white;
            font-size: 14px;
        }

        .toolbar-actions button {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
        }

        .toolbar-actions button:hover {
            background-color: var(--bg-panel);
            border-color: var(--border);
        }

        .toolbar-actions button.active {
            background-color: var(--accent);
            color: white;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 40px);
        }

        /* Sidebars */
        .sidebar {
            width: 250px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }

        .sidebar.right {
            border-right: none;
            border-left: 1px solid var(--border);
        }

        .sidebar.collapsed {
            width: 0;
            overflow: hidden;
            border: none;
        }

        .panel-header {
            padding: 10px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            color: #888;
        }

        .panel-content {
            padding: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .tree-item {
            padding: 6px 8px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tree-item:hover {
            background-color: #2a2d2e;
        }

        .tree-item.selected {
            background-color: #37373d;
            color: white;
        }

        .icon-box {
            width: 14px;
            height: 14px;
            background-color: #555;
            border-radius: 2px;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            position: relative;
            background-color: #111;
            overflow: hidden;
        }

        #editor-canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }

        .canvas-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            font-size: 12px;
            color: #666;
        }

        .transform-gizmo-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
        }

        /* Properties Panel Inputs */
        .prop-group {
            margin-bottom: 15px;
        }
        .prop-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            display: block;
        }
        .prop-input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #ccc;
            padding: 4px;
            font-size: 12px;
            border-radius: 2px;
        }
        .prop-row {
            display: flex;
            gap: 5px;
        }
        .prop-row input {
            flex: 1;
        }

    </style>
    <!-- Import Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <header>
        <div class="logo">RocketEditor <span style="font-weight:normal; opacity:0.6; font-size:10px;">v1.0</span></div>
        <div class="toolbar-actions">
            <button id="btn-select" class="active">Select (Q)</button>
            <button id="btn-translate">Translate (W)</button>
            <button id="btn-rotate">Rotate (E)</button>
            <button id="btn-scale">Scale (R)</button>
            <div style="display:inline-block; width:1px; height:14px; background:#444; margin:0 5px; vertical-align:middle;"></div>
            <button id="btn-zen">Zen Mode</button>
        </div>
        <div class="toolbar-actions">
            <button>Export</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Left Sidebar: Hierarchy -->
        <aside class="sidebar" id="left-sidebar">
            <div class="panel-header">Hierarchy</div>
            <div class="panel-content" id="hierarchy-list">
                <div class="tree-item selected" data-id="root">
                    <div class="icon-box" style="background:#4caf50"></div>
                    <span>Stage Root</span>
                </div>
                <div class="tree-item" data-id="fuel-tank">
                    <div class="icon-box" style="background:#2196f3"></div>
                    <span>Fuel Tank</span>
                </div>
                <div class="tree-item" data-id="engine">
                    <div class="icon-box" style="background:#ff5722"></div>
                    <span>Engine</span>
                </div>
                <div class="tree-item" data-id="fin">
                    <div class="icon-box" style="background:#ffeb3b"></div>
                    <span>Fin</span>
                </div>
            </div>
        </aside>

        <!-- Center: Canvas -->
        <main class="canvas-area">
            <canvas id="editor-canvas"></canvas>
            <div class="canvas-overlay">
                Orthographic Camera<br>
                Grid: 10m
            </div>
            <div class="transform-gizmo-hint">
                Left Click: Select/Move<br>
                Right Click: Pan<br>
                Scroll: Zoom
            </div>
        </main>

        <!-- Right Sidebar: Properties -->
        <aside class="sidebar right" id="right-sidebar">
            <div class="panel-header">Properties</div>
            <div class="panel-content">
                <div id="props-content">
                    <div class="prop-group">
                        <span class="prop-label">Name</span>
                        <input type="text" class="prop-input" value="Stage Root" readonly>
                    </div>
                    <div class="prop-group">
                        <span class="prop-label">Transform</span>
                        <div class="prop-row">
                            <input type="number" class="prop-input" placeholder="X" value="0">
                            <input type="number" class="prop-input" placeholder="Y" value="0">
                            <input type="number" class="prop-input" placeholder="Z" value="0">
                        </div>
                        <div class="prop-row" style="margin-top:5px">
                            <input type="number" class="prop-input" placeholder="RX" value="0">
                            <input type="number" class="prop-input" placeholder="RY" value="0">
                            <input type="number" class="prop-input" placeholder="RZ" value="0">
                        </div>
                    </div>
                    <div class="prop-group">
                        <span class="prop-label">Material</span>
                        <select class="prop-input">
                            <option>Standard Metal</option>
                            <option>Painted White</option>
                            <option>Carbon Fiber</option>
                        </select>
                    </div>
                </div>
                <div id="no-selection" style="display:none; text-align:center; color:#666; margin-top:20px;">
                    No object selected
                </div>
            </div>
        </aside>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Configuration ---
        const canvas = document.getElementById('editor-canvas');
        const hierarchyList = document.getElementById('hierarchy-list');
        const propsContent = document.getElementById('props-content');
        const noSelectionMsg = document.getElementById('no-selection');
        
        let isZenMode = false;
        let selectedObject = null;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        // Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        // Axes Helper
        const axesHelper = new THREE.AxesHelper(2);
        scene.add(axesHelper);

        // Camera (Orthographic like the original request implied for CAD)
        const aspect = canvas.clientWidth / canvas.clientHeight;
        const frustumSize = 10;
        const camera = new THREE.OrthographicCamera(
            frustumSize * aspect / -2,
            frustumSize * aspect / 2,
            frustumSize / 2,
            frustumSize / -2,
            0.1,
            1000
        );
        camera.position.set(5, 5, 5);
        camera.lookAt(0, 0, 0);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- Objects (Mock Data) ---
        const objects = {};

        function createPart(name, geometry, material, x, y, z) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.name = name;
            mesh.userData.id = name.toLowerCase().replace(' ', '-');
            scene.add(mesh);
            objects[mesh.userData.id] = mesh;
            return mesh;
        }

        // Create Mock Rocket Parts
        const rootGroup = new THREE.Group();
        rootGroup.name = "Stage Root";
        rootGroup.userData.id = "root";
        scene.add(rootGroup);
        objects["root"] = rootGroup;

        const tankGeo = new THREE.CylinderGeometry(0.5, 0.5, 2, 32);
        const tankMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4 });
        const tank = createPart("Fuel Tank", tankGeo, tankMat, 0, 1, 0);
        rootGroup.add(tank);

        const engineGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.5, 32);
        const engineMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8 });
        const engine = createPart("Engine", engineGeo, engineMat, 0, -0.25, 0);
        rootGroup.add(engine);

        const finGeo = new THREE.BoxGeometry(0.1, 0.5, 0.8);
        const finMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
        const fin = createPart("Fin", finGeo, finMat, 0.5, 0, 0);
        rootGroup.add(fin);


        // --- Controls ---
        
        // Orbit Controls (Camera)
        const orbit = new OrbitControls(camera, canvas);
        orbit.enableDamping = true;
        orbit.dampingFactor = 0.05;
        orbit.mouseButtons = {
            LEFT: null, // Disable left click for orbit, we use it for selection/gizmo
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.PAN
        };

        // Transform Controls (Gizmo)
        const control = new TransformControls(camera, renderer.domElement);
        control.addEventListener('dragging-changed', function (event) {
            orbit.enabled = !event.value;
        });
        control.addEventListener('change', () => {
            if(selectedObject) updatePropertiesPanel(selectedObject);
        });
        scene.add(control);

        // Raycaster for Selection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseClick(event) {
            // Calculate mouse position in normalized device coordinates
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect with objects (exclude helpers)
            const intersects = raycaster.intersectObjects([tank, engine, fin, rootGroup], true);

            if (intersects.length > 0) {
                // Find the first object that isn't the root group unless nothing else found
                let hit = intersects.find(i => i.object !== rootGroup) || intersects[0];
                selectObject(hit.object);
            } else {
                deselectObject();
            }
        }

        canvas.addEventListener('pointerdown', (e) => {
            // Only select on left click if not dragging gizmo
            if(e.button === 0 && !control.dragging) {
                // Small delay to allow transform controls to catch drag first
                setTimeout(() => {
                    if(!control.dragging) onMouseClick(e);
                }, 10);
            }
        });

        // --- Logic Functions ---

        function selectObject(obj) {
            selectedObject = obj;
            control.attach(obj);
            
            // Update UI
            hierarchyList.querySelectorAll('.tree-item').forEach(el => {
                el.classList.remove('selected');
                if(el.dataset.id === obj.userData.id) {
                    el.classList.add('selected');
                }
            });

            propsContent.style.display = 'block';
            noSelectionMsg.style.display = 'none';
            updatePropertiesPanel(obj);
        }

        function deselectObject() {
            selectedObject = null;
            control.detach();
            
            hierarchyList.querySelectorAll('.tree-item').forEach(el => el.classList.remove('selected'));
            
            propsContent.style.display = 'none';
            noSelectionMsg.style.display = 'block';
        }

        function updatePropertiesPanel(obj) {
            // In a real app, bind inputs to state. Here we just show static values for demo
            // or update them simply.
            const inputs = propsContent.querySelectorAll('input[type="number"]');
            if(inputs.length >= 6) {
                inputs[0].value = obj.position.x.toFixed(2);
                inputs[1].value = obj.position.y.toFixed(2);
                inputs[2].value = obj.position.z.toFixed(2);
                
                inputs[3].value = (obj.rotation.x * (180/Math.PI)).toFixed(0);
                inputs[4].value = (obj.rotation.y * (180/Math.PI)).toFixed(0);
                inputs[5].value = (obj.rotation.z * (180/Math.PI)).toFixed(0);
            }
            
            const nameInput = propsContent.querySelector('input[type="text"]');
            if(nameInput) nameInput.value = obj.name;
        }

        // Hierarchy Click Handling
        hierarchyList.addEventListener('click', (e) => {
            const item = e.target.closest('.tree-item');
            if(item && objects[item.dataset.id]) {
                selectObject(objects[item.dataset.id]);
            }
        });

        // Toolbar Actions
        document.getElementById('btn-select').addEventListener('click', (e) => setMode('translate', e.target));
        document.getElementById('btn-translate').addEventListener('click', (e) => setMode('translate', e.target));
        document.getElementById('btn-rotate').addEventListener('click', (e) => setMode('rotate', e.target));
        document.getElementById('btn-scale').addEventListener('click', (e) => setMode('scale', e.target));

        function setMode(mode, btnElement) {
            control.setMode(mode);
            document.querySelectorAll('.toolbar-actions button').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
        }

        // Zen Mode
        document.getElementById('btn-zen').addEventListener('click', () => {
            isZenMode = !isZenMode;
            const left = document.getElementById('left-sidebar');
            const right = document.getElementById('right-sidebar');
            const btn = document.getElementById('btn-zen');

            if(isZenMode) {
                left.classList.add('collapsed');
                right.classList.add('collapsed');
                btn.classList.add('active');
                btn.textContent = "Exit Zen";
            } else {
                left.classList.remove('collapsed');
                right.classList.remove('collapsed');
                btn.classList.remove('active');
                btn.textContent = "Zen Mode";
            }
            handleResize();
        });

        // Keyboard Shortcuts
        window.addEventListener('keydown', function (event) {
            switch (event.key.toLowerCase()) {
                case 'w': setMode('translate', document.getElementById('btn-translate')); break;
                case 'e': setMode('rotate', document.getElementById('btn-rotate')); break;
                case 'r': setMode('scale', document.getElementById('btn-scale')); break;
                case 'q': setMode('translate', document.getElementById('btn-select')); break; // Select usually implies translate ready
                case 'delete': 
                case 'backspace':
                    if(selectedObject && selectedObject !== rootGroup) {
                        // Simple delete logic
                        control.detach();
                        scene.remove(selectedObject);
                        delete objects[selectedObject.userData.id];
                        // Remove from hierarchy DOM
                        const domItem = document.querySelector(`.tree-item[data-id="${selectedObject.userData.id}"]`);
                        if(domItem) domItem.remove();
                        deselectObject();
                    }
                    break;
            }
        });

        // Resize Handler
        function handleResize() {
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            
            renderer.setSize(width, height);
            
            const aspect = width / height;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            
            camera.updateProjectionMatrix();
        }

        window.addEventListener('resize', handleResize);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
